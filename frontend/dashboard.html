<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Uptime Monitoring</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- <link rel="stylesheet" href="../static/css/style.css"> -->
    <link rel="stylesheet" href="../style/dashboard.css">
</head>

<body>

    <div class="container py-4">

        <!-- Header -->
        <h1 class="fw-bold text-dark mb-5">
            Uptime Monitoring
        </h1>

        <!-- Section 1 -->
        <div class="card shadow-sm mb-5">
            <div class="card-body">

                <h3 class="mb-4">
                    Add your Website for Tracking
                </h3>

                <form action="/add-website" method="POST">

                    <div class="mb-3">

                        <label class="form-label">

                            Name of Website

                        </label>

                        <input type="text" class="form-control" name="website_name" required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            WebURL

                        </label>

                        <input type="url" class="form-control" name="website_url" placeholder="https://example.com"
                            required>

                    </div>

                    <button type="submit" class="btn btn-primary">

                        Add

                    </button>

                </form>

            </div>
        </div>

        <!-- Section 2 -->

        <div class="card shadow-sm">

            <div class="card-body">

                <h3 class="mb-4">
                    Tracking Status
                </h3>

                <div class="table-responsive">

                    <div class="row mb-3">

                        <div class="col-md-4">

                            <label class="form-label">
                                Filter Website
                            </label>

                            <select id="website-filter" class="form-select">

                                <option value="">
                                    All Websites
                                </option>

                            </select>

                        </div>

                    </div>

                    <table class="table table-hover align-middle">

                        <thead class="table-light">

                            <tr>
                                <th>Name</th>
                                <th>URL</th>
                                <th>Status</th>
                                <th>Status Code</th>

                                <th>Response</th>
                                <th>Time</th>
                                <th>Response Difference</th>
                            </tr>

                        </thead>

                        <tbody id="tracking-table-body">

                            <tr>
                                <td colspan="6" class="text-center">
                                    Loading...
                                </td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script>

        const filterDropdown = document.getElementById("website-filter");


        async function loadWebsiteList() {

            const response = await fetch("/website-list");

            const websites = await response.json();

            filterDropdown.innerHTML = "";

            // Default Option
            filterDropdown.innerHTML += `
        <option value="">
            All Websites
        </option>
    `;

            websites.forEach(site => {

                filterDropdown.innerHTML += `

            <option value="${site.web_id}">
                ${site.web_name}
            </option>

        `;

            });

        }



        async function loadTrackingData() {

            let url = "/tracking-data";

            if (filterDropdown.value !== "") {

                url += "?web_id=" + filterDropdown.value;

            }

            const response = await fetch(url);

            const data = await response.json();

            const tbody = document.getElementById("tracking-table-body");

            tbody.innerHTML = "";

            if (data.length === 0) {

                tbody.innerHTML = `
            <tr>
                <td colspan="6" class="text-center text-muted">
                    No Tracking Records Found
                </td>
            </tr>
        `;

                return;

            }

            data.forEach(record => {

                let statusHTML = "";

                if (record.status === "UP") {

                    statusHTML = `
                <span class="status">
                    <span class="dot green"></span>
                    UP
                </span>
            `;

                }

                else {

                    statusHTML = `
                <span class="status">
                    <span class="dot red"></span>
                    DOWN
                </span>
            `;

                }


                let responseTime =
                    record.response_time_ms == null
                        ? "--"
                        : record.response_time_ms + " ms";


                let responseDifference = "--";

                if (record.response_difference != null) {

                    if (record.response_difference >= 0) {

                        responseDifference = `
                    <span class="diff-positive">
                        +${record.response_difference} ms
                    </span>
                `;

                    }

                    else {

                        responseDifference = `
                    <span class="diff-negative">
                        ${record.response_difference} ms
                    </span>
                `;

                    }

                }


                tbody.innerHTML += `

            <tr>

                <td>${record.web_name}</td>

                <td>${record.url}</td>

                <td>${statusHTML}</td>

                <td>

                    ${
                        record.status_code == null
                        ? "--"
                        : record.status_code
                    }

                </td>

                <td>${responseTime}</td>

                <td>${record.hit_timestamp}</td>

                <td>${responseDifference}</td>

            </tr>

        `;

            });

        }


        // Populate dropdown
        loadWebsiteList().then(() => {

            loadTrackingData();

        });


        // Filter Change
        filterDropdown.addEventListener("change", () => {

            loadTrackingData();

        });


        // Auto Refresh Every Minute
        setInterval(() => {

            loadTrackingData();

        }, 60000);

    </script>


</body>

</html>
